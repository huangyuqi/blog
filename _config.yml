# Site settings
title: "helloworld"
description: "IT、随笔"
github_username: huangyuqi
repository: "huangyuqi/blog"
minimal_mistakes_skin: "contrast"
search: false

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:year/:month/:title/
paginate: 10
paginate_path: /page:num/
timezone: Asia/Shanghai

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

author:
  name: "helloworld"
  bio: "IT/随笔"
  location: "Shanghai"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/huangyuqi"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/huangyuqi"
  since: "2026"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
